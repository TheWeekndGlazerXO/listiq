
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IB Command Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b0f;--surface:#131318;--card:#1a1a22;--card-h:#1f1f2a;
  --border:rgba(255,255,255,0.07);--border-s:rgba(255,255,255,0.13);
  --text:#e4e2df;--muted:#6a6a7e;--dim:#2e2e3e;
  --accent:#f0c040;--accent-bg:rgba(240,192,64,0.1);
  --danger:#ff5e5e;--success:#4ade80;--r:10px;--rs:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
  display:grid;grid-template-rows:60px 1fr;grid-template-columns:230px 1fr;
  height:100vh;overflow:hidden}
header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:10px;z-index:10}
.logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;
  letter-spacing:-0.02em;white-space:nowrap}
.logo em{color:var(--accent);font-style:normal}
.header-sep{flex:1}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:5px;white-space:nowrap;cursor:default}
.stat-pill b{color:var(--text);font-weight:500}
.pill-urgent b{color:var(--danger)}
.pill-gold b{color:var(--accent)}
.pill-streak b{color:#fb923c}
.pill-pomo{cursor:pointer;transition:all 0.15s}
.pill-pomo:hover{background:var(--card-h);border-color:var(--border-s)}
.pill-pomo.running{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.06)}
.pill-pomo.running b{color:var(--success)}
aside{background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:14px 10px;overflow-y:auto;gap:2px}
.sidebar-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--dim);
  text-transform:uppercase;letter-spacing:0.1em;padding:10px 10px 5px}
.sbtn{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rs);
  cursor:pointer;border:none;background:transparent;color:var(--muted);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:500;width:100%;text-align:left;
  transition:all 0.15s;position:relative;border-left:2px solid transparent}
.sbtn:hover{background:var(--card);color:var(--text)}
.sbtn.active{background:var(--card);color:var(--text);border-left-color:var(--sc)}
.s-ic{font-family:'DM Mono',monospace;font-size:13px;width:22px;text-align:center;
  flex-shrink:0;color:var(--sc)}
.s-nm{flex:1}
.s-bage{font-family:'DM Mono',monospace;font-size:10px;background:rgba(255,255,255,0.05);
  border-radius:10px;padding:2px 7px;color:var(--muted)}
.s-prog{height:2px;background:rgba(255,255,255,0.05);position:absolute;
  bottom:0;left:0;right:0;overflow:hidden;border-radius:0 0 var(--rs) var(--rs)}
.s-prog-f{height:100%;background:var(--sc);transition:width 0.5s ease}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:6px 0}
main{overflow-y:auto;padding:26px 30px;display:flex;flex-direction:column;gap:20px}
.subj-header{display:flex;align-items:center;gap:16px}
.subj-icon{width:50px;height:50px;border-radius:var(--r);display:flex;align-items:center;
  justify-content:center;font-family:'DM Mono',monospace;font-size:20px;flex-shrink:0;
  background:var(--sc-bg);border:1px solid var(--sc-border);color:var(--sc)}
.subj-info h1{font-family:'Playfair Display',serif;font-size:25px;font-weight:700;
  letter-spacing:-0.02em;line-height:1.2}
.subj-info p{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border)}
.tab{font-family:'Syne',sans-serif;font-size:13px;font-weight:500;color:var(--muted);
  background:transparent;border:none;cursor:pointer;padding:8px 14px;
  border-radius:var(--rs) var(--rs) 0 0;position:relative;transition:color 0.15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text)}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;
  background:var(--sc,var(--accent));border-radius:1px}
.panel{display:none;flex-direction:column;gap:14px}
.panel.on{display:flex}
.add-row{display:flex;gap:8px}
.inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;
  outline:none;transition:border-color 0.15s}
.inp:focus{border-color:var(--border-s)}
.inp::placeholder{color:var(--dim)}
input[type=date].inp{color:var(--muted)}
.btn{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 15px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;
  font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--card-h);border-color:var(--border-s)}
.btn-p{background:var(--accent-bg);border-color:rgba(240,192,64,0.2);color:var(--accent)}
.btn-p:hover{background:rgba(240,192,64,0.18)}
.btn-danger{background:rgba(255,94,94,0.08);border-color:rgba(255,94,94,0.2);color:var(--danger)}
.btn-danger:hover{background:rgba(255,94,94,0.15)}
.todo-list{display:flex;flex-direction:column;gap:3px}
.todo{display:flex;align-items:center;gap:11px;padding:10px 13px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--rs);transition:background 0.12s;
  animation:fadeIn 0.18s ease}
.todo:hover{background:var(--card-h)}
.todo.done{opacity:0.42}
.chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border-s);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:transparent;transition:all 0.15s}
.chk.on{background:var(--sc,var(--accent));border-color:var(--sc,var(--accent))}
.chk.on::after{content:'';width:5px;height:9px;border:1.5px solid #000;
  border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.todo-txt{flex:1;font-size:13px;line-height:1.4}
.todo.done .todo-txt{text-decoration:line-through;color:var(--muted)}
.todo-pri{font-size:11px;padding:2px 7px;border-radius:8px;
  font-family:'DM Mono',monospace;flex-shrink:0}
.pri-high{background:rgba(255,94,94,0.12);color:#ff8080}
.pri-med{background:rgba(240,192,64,0.1);color:var(--accent)}
.pri-low{background:rgba(255,255,255,0.05);color:var(--muted)}
.del-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;
  padding:2px 6px;border-radius:4px;line-height:1;transition:all 0.12s}
.del-btn:hover{color:var(--danger);background:rgba(255,94,94,0.1)}
.empty{text-align:center;padding:36px 20px;color:var(--dim);font-size:12px;
  font-family:'DM Mono',monospace}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;transition:all 0.15s;animation:fadeIn 0.18s ease;
  border-left:3px solid transparent;position:relative}
.res-card:hover{background:var(--card-h);border-color:var(--border-s)}
.res-card:hover .res-color-strip{opacity:1}
.res-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.res-ic{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
  border:1px solid var(--border);overflow:hidden}
.res-ic img{width:100%;height:100%;object-fit:contain;border-radius:7px}
.res-color-strip{position:absolute;top:8px;right:8px;display:flex;gap:4px;
  opacity:0;transition:opacity 0.15s;z-index:2}
.rc-swatch{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  transition:transform 0.12s;flex-shrink:0}
.rc-swatch:hover{transform:scale(1.25)}
.rc-swatch.active{border-color:rgba(255,255,255,0.6)}
.hl-none{background:rgba(255,255,255,0.12)}
.hl-yellow{background:#f0c040}
.hl-green{background:#4ade80}
.hl-blue{background:#60a5fa}
.hl-pink{background:#f472b6}
.hl-orange{background:#fb923c}
.res-ttl{font-size:14px;font-weight:600;line-height:1.3;flex:1}
.res-url{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:10px}
.res-foot{display:flex;align-items:center;justify-content:space-between}
.tag{font-size:10px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:10px;
  background:rgba(255,255,255,0.06);color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.res-acts{display:flex;gap:6px}
.res-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);
  color:var(--muted);cursor:pointer;padding:4px 9px;font-size:11px;transition:all 0.12s;
  font-family:'Syne',sans-serif}
.res-open:hover{color:var(--accent);background:var(--accent-bg);border-color:rgba(240,192,64,0.2)}
.res-del:hover{color:var(--danger);background:rgba(255,94,94,0.08)}
.res-edit:hover{color:#60a5fa;background:rgba(96,165,250,0.08);border-color:rgba(96,165,250,0.2)}
/* Edit modal */
#res-edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#res-edit-overlay.open{display:flex}
#res-edit-modal{background:var(--surface);border:1px solid var(--border-s);
  border-radius:14px;width:480px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.6);
  animation:fadeIn 0.18s ease}
.rem-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.rem-title{font-size:15px;font-weight:700}
.rem-close{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:20px;line-height:1;padding:0 2px;transition:color 0.12s}
.rem-close:hover{color:var(--text)}
.rem-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.rem-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;display:block}
.rem-img-row{display:flex;align-items:center;gap:10px}
.rem-img-preview{width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,0.05);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:18px;overflow:hidden;flex-shrink:0}
.rem-img-preview img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.rem-footer{padding:14px 20px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end}
.prog-layout{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center}
.ring-wrap{position:relative;width:140px;height:140px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1}
.ring-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
.prog-right{display:flex;flex-direction:column;gap:14px}
.slider-label{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;display:block;margin-bottom:7px}
input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;
  background:var(--border-s);border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--sc,var(--accent));cursor:pointer;border:2px solid var(--bg)}
.notes-area{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;
  line-height:1.8;resize:vertical;outline:none;width:100%;min-height:130px;transition:border-color 0.15s}
.notes-area:focus{border-color:var(--border-s)}
.notes-area::placeholder{color:var(--dim)}
.prog-tips{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.prog-tips h4{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.tip-row{font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;color:var(--text)}
.tip-row:last-child{border-bottom:none;padding-bottom:0}
.tip-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--accent));flex-shrink:0;margin-top:5px}
/* Grade boundary bar */
.gb-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.gb-wrap h4{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px}
.gb-bar-track{position:relative;height:28px;background:rgba(255,255,255,0.04);
  border-radius:6px;overflow:hidden;margin-bottom:8px}
.gb-seg{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;transition:opacity 0.2s}
.gb-marker{position:absolute;top:-4px;bottom:-4px;width:3px;border-radius:2px;
  background:white;box-shadow:0 0 8px rgba(255,255,255,0.6);transition:left 0.5s ease}
.gb-marker-label{position:absolute;top:-22px;font-family:'DM Mono',monospace;font-size:10px;
  white-space:nowrap;transform:translateX(-50%);color:var(--text);
  background:var(--card);padding:1px 5px;border-radius:3px}
.gb-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.gb-leg-item{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  display:flex;align-items:center;gap:4px}
.gb-dot{width:8px;height:8px;border-radius:2px}
/* Papers tab */
.papers-table{width:100%;border-collapse:collapse}
.papers-table th{text-align:left;font-size:11px;font-family:'DM Mono',monospace;
  color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:0 10px 10px;
  border-bottom:1px solid var(--border)}
.papers-table td{padding:10px;font-size:13px;border-bottom:1px solid var(--border)}
.papers-table tr:last-child td{border-bottom:none}
.papers-table tr:hover td{background:var(--card-h)}
.grade-badge{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;
  padding:3px 10px;border-radius:6px;display:inline-block}
.g7{background:rgba(74,222,128,0.15);color:#4ade80}
.g6{background:rgba(96,165,250,0.15);color:#60a5fa}
.g5{background:rgba(240,192,64,0.15);color:var(--accent)}
.g4{background:rgba(251,146,60,0.15);color:#fb923c}
.g3{background:rgba(255,94,94,0.15);color:var(--danger)}
.g12{background:rgba(100,100,120,0.15);color:var(--muted)}
.paper-add-form{display:grid;grid-template-columns:1fr 140px 70px 70px auto;gap:8px;align-items:center}
.papers-stats{display:flex;gap:20px;padding:14px 16px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r)}
.ps-item{display:flex;flex-direction:column;gap:3px}
.ps-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase}
.ps-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
/* Overview */
.ov-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ov-stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;text-align:center}
.ov-stat-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;
  line-height:1;color:var(--accent)}
.ov-stat-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  margin-top:5px;text-transform:uppercase;letter-spacing:0.06em}
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ov-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--sc);
  border-radius:var(--r);padding:14px;cursor:pointer;transition:all 0.15s}
.ov-card:hover{background:var(--card-h);border-top-color:var(--border-s);
  border-right-color:var(--border-s);border-bottom-color:var(--border-s)}
.ov-card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ov-ic{font-family:'DM Mono',monospace;font-size:14px;color:var(--sc)}
.ov-nm{font-size:13px;font-weight:700;flex:1}
.ov-grade{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px}
.ov-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);display:flex;gap:12px;margin-bottom:9px}
.ov-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.ov-bar-f{height:100%;background:var(--sc);border-radius:2px;transition:width 0.5s ease}
.sched-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.sched-card h3{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sched-day-badge{font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);
  background:var(--accent-bg);border-radius:4px;padding:2px 8px}
.sched-row{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center}
.sched-row:last-child{border-bottom:none}
.sched-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sched-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);width:115px;flex-shrink:0}
.sched-info{flex:1}
.sched-subj{font-size:13px;font-weight:600}
.sched-detail{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.section-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.08em}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.focus-card{background:linear-gradient(135deg,rgba(240,192,64,0.08),rgba(240,192,64,0.03));
  border:1px solid rgba(240,192,64,0.2);border-radius:var(--r);padding:18px}
.focus-card h3{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px}
.focus-subj{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
  margin:8px 0 4px;color:var(--text)}
.streak-card{background:linear-gradient(135deg,rgba(251,146,60,0.08),rgba(251,146,60,0.02));
  border:1px solid rgba(251,146,60,0.2);border-radius:var(--r);padding:18px}
.streak-card h3{font-size:13px;font-weight:700;color:#fb923c;margin-bottom:6px}
.streak-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;
  color:#fb923c;line-height:1}
.weekly-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.weekly-bar{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;margin:12px 0 6px;overflow:hidden}
.weekly-bar-f{height:100%;background:var(--accent);border-radius:4px;transition:width 0.5s ease}
.motiv-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 20px;border-left:3px solid var(--accent)}
.motiv-text{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;line-height:1.5}
.motiv-sub{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:6px}
.io-row{display:flex;gap:8px;flex-wrap:wrap}
/* Pomodoro floating panel */
#pomo-panel{position:fixed;bottom:24px;right:24px;width:260px;
  background:var(--surface);border:1px solid var(--border-s);border-radius:var(--r);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:100;display:none;animation:fadeIn 0.2s ease}
#pomo-panel.open{display:block}
.pomo-header{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)}
.pomo-title{font-size:13px;font-weight:700}

function getWeekStart() {
  const now = new Date(); now.setHours(0,0,0,0);
  const day = now.getDay(); const diff = now.getDate() - day + (day===0?-6:1);
  const mon = new Date(now.setDate(diff));
  return mon.toISOString().slice(0,10);
}

function load() {
  try { const s = localStorage.getItem('ib_v3'); return s ? JSON.parse(s) : defaultState(); }
  catch { return defaultState(); }
}
function save(s) { localStorage.setItem('ib_v3',JSON.stringify(s)); }

let S = load();
// migrate missing fields
if (!S.streak) S.streak = {last:null,count:0,longest:0};
if (!S.weeklyGoal) S.weeklyGoal = 15;
if (!S.weekStart) S.weekStart = getWeekStart();
if (!S.weeklyDone) S.weeklyDone = 0;
if (!S.weeklyDoneIds) S.weeklyDoneIds = [];
if (!S.subjectDefs) {
  S.subjectDefs = JSON.parse(JSON.stringify(DEFAULT_SUBJECTS));
}
Object.keys(S.subjects).forEach(k => {
  if (!S.subjects[k].papers) S.subjects[k].papers = [];
  if (!S.subjects[k].markSchemes) S.subjects[k].markSchemes = [];
  S.subjects[k].todos.forEach(t => { if(!t.pri) t.pri='med'; });
});
// Ensure all subjectDefs keys have a subjects entry
Object.keys(S.subjectDefs).forEach(k => {
  if (!S.subjects[k]) S.subjects[k]={progress:0,notes:'',papers:[],markSchemes:[],todos:[],resources:[]};
});

function uid() { return Math.random().toString(36).slice(2,8); }
function daysTo(d) {
  const now=new Date();now.setHours(0,0,0,0);
  const t=new Date(d);t.setHours(0,0,0,0);
  return Math.max(0,Math.round((t-now)/86400000));
}
function overallProgress() {
  const ks=Object.keys(getSubjects());
  return Math.round(ks.reduce((a,k)=>a+(S.subjects[k].progress||0),0)/ks.length);
}
function totalRemaining() {
  return Object.keys(getSubjects()).reduce((a,k)=>a+S.subjects[k].todos.filter(t=>!t.done).length,0);
}
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
function scoreToGrade(pct, k) {
  const b = BOUNDS[k] || BOUNDS.econ;
  if(pct>=b[7])return 7; if(pct>=b[6])return 6; if(pct>=b[5])return 5;
  if(pct>=b[4])return 4; if(pct>=b[3])return 3; return pct>0?2:1;
}
function gradeBadge(g) {
  const cls = g>=7?'g7':g>=6?'g6':g>=5?'g5':g>=4?'g4':g>=3?'g3':'g12';
  return `<span class="grade-badge ${cls}">Grade ${g}</span>`;
}
function getMotiv(pct) {
  for(const m of MOTIVS) if(pct<=m.max) return m;
  return MOTIVS[MOTIVS.length-1];
}

function updateHeader() {
  const days = daysTo(S.mockDate);
  document.getElementById('h-countdown').innerHTML=`<b>${days}</b> days to mocks`;
  document.getElementById('h-countdown').className=`stat-pill ${days<=7?'pill-urgent':'pill-gold'}`;
  document.getElementById('h-overall').innerHTML=`<b>${overallProgress()}%</b> avg progress`;
  document.getElementById('h-todos').innerHTML=`<b>${totalRemaining()}</b> tasks left`;
  document.getElementById('h-streak').innerHTML=`<b>${S.streak.count}</b> day streak`;
  if(!document.getElementById('pomo-panel').classList.contains('open')) {
    document.getElementById('pomo-pill-time').textContent=pomoFormatTime(pomoSecs);
  }
}

// Actions
function addTodo(k){
  const inp=document.getElementById('todo-inp');
  const txt=inp.value.trim();if(!txt)return;
  const pri=document.getElementById('todo-pri')?.value||'med';
  S.subjects[k].todos.push({id:uid(),text:txt,done:false,pri});
  save(S);inp.value='';render();
}
function toggleTodo(k,id){
  const t=S.subjects[k].todos.find(t=>t.id===id);
  if(!t)return;
  t.done=!t.done;
  if(t.done){
    // Weekly tracking
    if(!S.weeklyDoneIds.includes(id)){S.weeklyDone++;S.weeklyDoneIds.push(id);}
    // Auto streak update
    const today=new Date().toISOString().slice(0,10);
    if(S.streak.last!==today){
      const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
      S.streak.count=(S.streak.last===yesterday)?S.streak.count+1:1;
      S.streak.last=today;
      S.streak.longest=Math.max(S.streak.longest,S.streak.count);
    }
  } else {
    if(S.weeklyDoneIds.includes(id)){
      S.weeklyDone=Math.max(0,S.weeklyDone-1);
      S.weeklyDoneIds=S.weeklyDoneIds.filter(x=>x!==id);
    }
  }
  save(S);render();
}
function deleteTodo(k,id){
  S.subjects[k].todos=S.subjects[k].todos.filter(t=>t.id!==id);save(S);render();
}

function handleLogoFile(input,ctx){

function readLogoFile(file,ctx){
  const reader=new FileReader();
  reader.onload=e=>{
    const src=e.target.result;
    _logoSel[ctx]=src;

    if(ctx==='rem')document.getElementById('rem-img').value=src;
    document.querySelectorAll(`#${ctx}-presets .logo-preset`).forEach(el=>el.classList.remove('selected'));
  };
  reader.readAsDataURL(file);

// ===== INDEXEDDB (PDF storage — no size limit unlike localStorage) =====
const IDB_NAME='ib_pdfs_v1',IDB_STORE='pdfs';
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>rej(r.error);
  });
}
async function idbSet(key,val){
  const db=await idbOpen();
  return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(val,key);tx.oncomplete=res;tx.onerror=rej;});
}
async function idbGet(key){
  const db=await idbOpen();
  return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readonly');const r=tx.objectStore(IDB_STORE).get(key);r.onsuccess=()=>res(r.result);r.onerror=rej;});
}
async function idbDel(key){
  const db=await idbOpen();
  return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(key);tx.oncomplete=res;tx.onerror=rej;});
}

  const date=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  await idbSet(id, await file.arrayBuffer());
  if(!S.subjects[k]) S.subjects[k]={progress:0,notes:'',papers:[],markSchemes:[],todos:[],resources:[]};
  S.subjects[k].papers.push({id,name,date,raw:null,max:100,notes:'',hasPdf:true});
  save(S);
  S.tab='papers'; save(S); render();
}
async function handlePdfDropEntry(e,k,paperId){
  e.preventDefault();
  const file=[...e.dataTransfer.files].find(f=>f.type==='application/pdf');
  if(file) await attachPdfEntry(file,k,paperId);
}
async function handlePdfFileEntry(input,k,paperId){
  if(input.files[0]) await attachPdfEntry(input.files[0],k,paperId);
}
async function attachPdfEntry(file,k,paperId){
  await idbSet(paperId, await file.arrayBuffer());
  const p=S.subjects[k].papers.find(p=>p.id===paperId);
  if(p){p.hasPdf=true;save(S);renderMain();}
}
async function togglePdfEntry(id,k){
  const entry=document.getElementById(`pdf-entry-${id}`);
  if(!entry)return;
  const wasOpen=entry.classList.contains('open');
  document.querySelectorAll('.pdf-entry.open').forEach(e=>e.classList.remove('open'));
  if(!wasOpen){
    entry.classList.add('open');
    const frame=document.getElementById(`pdf-frame-${id}`);
    if(frame&&!frame.src){
      const buf=await idbGet(id);
      if(buf){
        const blob=new Blob([buf],{type:'application/pdf'});
        frame.src=URL.createObjectURL(blob);
      }
    }
  }
}
function updatePaperField(k,id,field,val){
  const p=S.subjects[k].papers.find(p=>p.id===id);
  if(!p)return;
  p[field]=(field==='raw'||field==='max')?parseInt(val)||0:val;
  save(S);
}
async function deletePaper(k,id){
  S.subjects[k].papers=S.subjects[k].papers.filter(p=>p.id!==id);
  save(S); await idbDel(id).catch(()=>{}); renderMain();
}

// ===== SUBJECT MODAL =====
let _sEditKey=null,_sLevel='SL',_sIcon='∑',_sColor='#4ade80';
const ICON_OPTS=['∑','↗','◈','⬡','✦','◉','△','◇','✶','⊕','∞','⊗','⌘','◐','✿','⬤','α','β','λ','π','🔬','🇪🇸','📔'];
const COLOR_OPTS=['#4ade80','#f59e0b','#a78bfa','#34d399','#f472b6','#60a5fa','#fb923c','#e879f9','#38bdf8','#f87171','#facc15','#a3e635'];

function openSubjModal(k){
  _sEditKey=k;
  const subjs=getSubjects();
  if(k&&subjs[k]){
    const s=subjs[k];
    document.getElementById('sm-title-txt').textContent='Edit Subject';
    document.getElementById('sm-name').value=s.name.replace(/ (HL|SL)$/,'');
    _sLevel=s.level||'SL'; _sIcon=s.ic||'∑'; _sColor=s.color||'#4ade80';
    const isDefault=!!DEFAULT_SUBJECTS[k];
    document.getElementById('sm-del-wrap').innerHTML=!isDefault
      ?`<button class="btn btn-danger" style="font-size:12px" onclick="deleteSubj('${k}')">Delete subject</button>`:'';
  } else {
    document.getElementById('sm-title-txt').textContent='Add Subject';
    document.getElementById('sm-name').value='';
    _sLevel='SL'; _sIcon='∑'; _sColor='#4ade80';
    document.getElementById('sm-del-wrap').innerHTML='';
  }
  // Build icon grid
  document.getElementById('sm-icon-grid').innerHTML=ICON_OPTS.map(ic=>
    `<button class="icon-opt ${_sIcon===ic?'sel':''}" onclick="setSIcon('${ic}')">${ic}</button>`
  ).join('');
  // Build color swatches
  document.getElementById('sm-color-swatches').innerHTML=COLOR_OPTS.map(c=>
    `<div class="color-swatch ${_sColor===c?'sel':''}" style="background:${c}" onclick="setSColor('${c}')"></div>`
  ).join('');
  setSLevel(_sLevel);
  document.getElementById('subj-modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('sm-name').focus(),80);
}
function closeSubjModal(){ document.getElementById('subj-modal-overlay').classList.remove('open'); _sEditKey=null; }
function setSLevel(lv){
  _sLevel=lv;
  document.getElementById('sm-sl-btn').classList.toggle('on',lv==='SL');
  document.getElementById('sm-hl-btn').classList.toggle('on',lv==='HL');
}
function setSIcon(ic){
  _sIcon=ic;
  document.querySelectorAll('#sm-icon-grid .icon-opt').forEach(b=>b.classList.toggle('sel',b.textContent===ic));
}
function setSColor(c){
  _sColor=c;
  document.querySelectorAll('#sm-color-swatches .color-swatch').forEach(s=>{
    s.classList.toggle('sel',s.style.backgroundColor===c||s.getAttribute('onclick')?.includes(c));
  });
}
function saveSubjModal(){
  const raw=document.getElementById('sm-name').value.trim();
  if(!raw){alert('Please enter a subject name.');return;}
  const fullName=`${raw} ${_sLevel}`;
  if(!S.subjectDefs) S.subjectDefs={...DEFAULT_SUBJECTS};
  if(_sEditKey){
    S.subjectDefs[_sEditKey]={...S.subjectDefs[_sEditKey],name:fullName,ic:_sIcon,color:_sColor,level:_sLevel};
  } else {
    const key=raw.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+uid();
    S.subjectDefs[key]={name:fullName,ic:_sIcon,color:_sColor,level:_sLevel};
    S.subjects[key]={progress:0,notes:'',papers:[],markSchemes:[],todos:[],resources:[]};
    S.view=key; S.tab='todos';
  }
  save(S); closeSubjModal(); render();
}
function deleteSubj(k){
  if(!confirm(`Delete "${getSubjects()[k]?.name}"?\n\nAll todos, resources, papers and mark schemes for this subject will be lost.`))return;
  delete S.subjectDefs[k];
  delete S.subjects[k];
  idbDel(k).catch(()=>{});
  if(S.view===k) S.view='overview';
  save(S); closeSubjModal(); render();
}
function setProgress(k,v){
  S.subjects[k].progress=parseInt(v);save(S);
  const el=document.getElementById('slider-lbl');
  if(el)el.textContent=`Drag to set progress — ${v}%`;
  const rp=document.getElementById('ring-pct-val');
  if(rp)rp.textContent=`${v}%`;
  const r=56,circ=2*Math.PI*r,fill=circ*(v/100);
  const circle=document.querySelector('circle:last-child');
  if(circle)circle.setAttribute('stroke-dasharray',`${fill} ${circ}`);
  updateHeader();renderSidebar();
}
function saveNotes(k,v){S.subjects[k].notes=v;save(S);}
function logStudyDay(){
  const today=new Date().toISOString().slice(0,10);
  if(S.streak.last===today){alert('Already logged today!');return;}
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  S.streak.count=(S.streak.last===yesterday)?S.streak.count+1:1;
  S.streak.last=today;
  S.streak.longest=Math.max(S.streak.longest,S.streak.count);
  save(S);render();
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`ib-dashboard-${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      S=parsed;save(S);render();alert('Data imported successfully!');
    }catch{alert('Invalid file. Make sure it is a valid IB Command Centre export.');}
  };
  reader.readAsText(file);
}
// ===== MARK SCHEME =====
function handleMsDrop(e,k){
  e.preventDefault();
  document.getElementById(`ms-drop-${k}`)?.classList.remove('over');
  const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'));
  files.forEach(f=>readMsFile(f,k));
}
function handleMsFiles(input,k){
  [...input.files].forEach(f=>readMsFile(f,k));
}
function readMsFile(file,k){
  const reader=new FileReader();
  reader.onload=e=>{
    const ms={
      id:uid(),
      title:file.name.replace(/\.[^.]+$/,''),
      img:e.target.result,
      notes:'',
      date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
    };
    if(!S.subjects[k].markSchemes) S.subjects[k].markSchemes=[];
    S.subjects[k].markSchemes.push(ms);
    save(S);
    // if already on markscheme tab just re-render, otherwise switch to it
    if(S.tab==='markscheme'&&S.view===k){renderMain();}
    else{S.tab='markscheme';save(S);render();}
  };
  reader.readAsDataURL(file);
}
function deleteMs(k,id){
  if(!confirm('Delete this mark scheme?'))return;
  S.subjects[k].markSchemes=S.subjects[k].markSchemes.filter(m=>m.id!==id);
  save(S);renderMain();
}
function saveMsTitle(k,id,txt){
  const ms=S.subjects[k].markSchemes.find(m=>m.id===id);
  if(ms){ms.title=txt.trim()||ms.title;save(S);}
}
function toggleMsZoom(id){
  const wrap=document.getElementById(`ms-img-wrap-${id}`);
  if(!wrap)return;
  wrap.classList.toggle('zoomed');
  const hint=wrap.querySelector('.ms-zoom-hint');
  if(hint)hint.textContent=wrap.classList.contains('zoomed')?'click to collapse':'click to zoom';
}
function startMsEdit(id){
  document.getElementById(`ms-notes-disp-${id}`)?.classList.add('editing');
  const editEl=document.getElementById(`ms-notes-edit-${id}`);
  if(editEl){editEl.classList.add('on');editEl.querySelector('textarea')?.focus();}
}
function cancelMsEdit(id,original){
  document.getElementById(`ms-notes-disp-${id}`)?.classList.remove('editing');
  document.getElementById(`ms-notes-edit-${id}`)?.classList.remove('on');
  const ta=document.getElementById(`ms-notes-ta-${id}`);
  if(ta)ta.value=original;
}
function saveMsNotes(k,id){
  const ta=document.getElementById(`ms-notes-ta-${id}`);
  if(!ta)return;
  const ms=S.subjects[k].markSchemes.find(m=>m.id===id);
  if(!ms)return;
  ms.notes=ta.value.trim();
  save(S);
  const disp=document.getElementById(`ms-notes-disp-${id}`);
  if(disp){
    disp.textContent=ms.notes||'Click to add notes — key points, common mistakes, things to remember...';
    disp.classList.toggle('empty',!ms.notes);
    disp.classList.remove('editing');
  }
  document.getElementById(`ms-notes-edit-${id}`)?.classList.remove('on');
}
// ===== POMODORO =====
let pomoInterval=null,pomoSecs=25*60,pomoMode='work',pomoRound=1,pomoRunning=false;
const POMO_TIMES={work:25*60,short:5*60,long:15*60};
const POMO_LABELS={work:'Focus session',short:'Short break',long:'Long break'};

function togglePomo(){document.getElementById('pomo-panel').classList.toggle('open');renderPomoDots();}
function pomoFormatTime(s){const m=Math.floor(s/60);const sc=s%60;return `${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}
function setPomoMode(m){
  if(pomoRunning)return;
  pomoMode=m;pomoSecs=POMO_TIMES[m];
  document.querySelectorAll('.pomo-mode').forEach(b=>b.classList.remove('on'));
  document.getElementById(`pm-${m==='work'?'work':m==='short'?'short':'long'}`).classList.add('on');
  document.getElementById('pomo-display').textContent=pomoFormatTime(pomoSecs);
  document.getElementById('pomo-phase').textContent=POMO_LABELS[m];
  document.getElementById('pomo-pill-time').textContent=pomoFormatTime(pomoSecs);
}
function togglePomoTimer(){
  if(pomoRunning){
    clearInterval(pomoInterval);pomoRunning=false;
    document.getElementById('pomo-start-btn').textContent='Resume';
    document.getElementById('pomo-pill').classList.remove('running');
  } else {
    pomoRunning=true;
    document.getElementById('pomo-start-btn').textContent='Pause';
    document.getElementById('pomo-pill').classList.add('running');
    pomoInterval=setInterval(()=>{
      pomoSecs--;
      const disp=pomoFormatTime(pomoSecs);
      document.getElementById('pomo-display').textContent=disp;
      document.getElementById('pomo-pill-time').textContent=disp;
      if(pomoSecs<=0){
        clearInterval(pomoInterval);pomoRunning=false;
        beepAlert();
        if(pomoMode==='work'){
          pomoRound++;renderPomoDots();
          const nextMode=pomoRound%4===1?'long':'short';
          document.getElementById('pomo-phase').textContent='Time for a break!';
          document.getElementById('pomo-start-btn').textContent='Start';
          setTimeout(()=>setPomoMode(nextMode),1500);
        } else {
          document.getElementById('pomo-phase').textContent='Break over — back to work!';
          setTimeout(()=>setPomoMode('work'),1500);
        }
        document.getElementById('pomo-pill').classList.remove('running');
      }
    },1000);
  }
}
function resetPomo(){
  clearInterval(pomoInterval);pomoRunning=false;
  pomoSecs=POMO_TIMES[pomoMode];
  document.getElementById('pomo-display').textContent=pomoFormatTime(pomoSecs);
  document.getElementById('pomo-phase').textContent=POMO_LABELS[pomoMode];
  document.getElementById('pomo-start-btn').textContent='Start';
  document.getElementById('pomo-pill-time').textContent=pomoFormatTime(pomoSecs);
  document.getElementById('pomo-pill').classList.remove('running');
}
function renderPomoDots(){
  const dots=document.getElementById('pomo-dots');if(!dots)return;
  const round=(pomoRound-1)%4;
  dots.innerHTML=[0,1,2,3].map(i=>`<div class="pomo-dot ${i<round?'filled':''}"></div>`).join('');
  const rt=document.getElementById('pomo-round-txt');
  if(rt)rt.textContent=`Round ${((pomoRound-1)%4)+1} of 4`;
}
function beepAlert(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.15,0.3].forEach(delay=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;g.gain.value=0.25;
      o.start(ctx.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.4);
      o.stop(ctx.currentTime+delay+0.4);
    });
  } catch(e){}
}
renderPomoDots();
render();

</script>
