<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — ListIQ</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#050505;
  margin:0;
  font-family:Inter, sans-serif;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 8%;
  background:rgba(5,5,5,0.85);
  backdrop-filter:blur(8px);
  z-index:1000;
}

.navbar a {
  text-decoration:none;
  color:white;
  margin:0 12px;
  font-size:14px;
}

.dashboard {
  padding:120px 4% 80px 4%;
  width:100%;
  max-width:100vw;
  box-sizing:border-box;
}

h1.gradient-text {
  margin-bottom:40px;
  font-size:2rem;
}

/* COUNTERS */
.top-counters {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  margin-bottom:60px;
  width:100%;
}

.counter-card {
  background:#0a0a0a;
  padding:30px;
  border-radius:20px;
  border:1px solid #111;
  transition:.3s ease;
}

.counter-card:hover {
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(106,0,255,0.25);
}

.counter-title {
  opacity:.6;
  font-size:14px;
}

.counter-number {
  font-size:36px;
  margin-top:12px;
  background:linear-gradient(90deg,#6a00ff,#00e5ff);
  background-clip:text;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
}

/* CHARTS */
.charts {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
  gap:40px;
  width:100%;
}

.chart-card {
  background:#0a0a0a;
  padding:30px;
  border-radius:20px;
  border:1px solid #111;
  transition:.3s ease;
}

.chart-card:hover {
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(106,0,255,0.25);
}

.logout-btn {
  cursor:pointer;
  font-size:14px;
  opacity:.8;
}

.logout-btn:hover {
  opacity:1;
}

/* FULL SCREEN ADJUSTMENTS */
html, body {
  height:100%;
}

.dashboard {
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.top-counters, .charts {
  width:100%;
}

</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div>
    <a href="index.html" class="gradient-text">LISTIQ</a>
  </div>

  <div>
    <a href="index.html">Home</a>
    <span class="logout-btn" id="logoutBtn">Logout</span>
  </div>
</nav>

<div class="dashboard">

<h1 class="gradient-text">Admin Intelligence Dashboard</h1>

<div class="top-counters">
  <div class="counter-card">
    <div class="counter-title">Free Users</div>
    <div class="counter-number" id="freeCount">0</div>
  </div>

  <div class="counter-card">
    <div class="counter-title">Plus Users</div>
    <div class="counter-number" id="plusCount">0</div>
  </div>

  <div class="counter-card">
    <div class="counter-title">Pro Users</div>
    <div class="counter-number" id="proCount">0</div>
  </div>

  <div class="counter-card">
    <div class="counter-title">Platinum Users</div>
    <div class="counter-number" id="platinumCount">0</div>
  </div>
</div>

<div class="charts">
  <div class="chart-card">
    <canvas id="subscriberChart"></canvas>
  </div>

  <div class="chart-card">
    <canvas id="revenueChart"></canvas>
  </div>

  <div class="chart-card">
    <canvas id="growthChart"></canvas>
  </div>

  <div class="chart-card">
    <canvas id="distributionChart"></canvas>
  </div>
</div>

</div>

<!-- SUPABASE + ADMIN LOGIC -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://nugtwmuiztbbhvuakrnu.supabase.co',
  'sb_publishable_UO7wZCYbFqW1SrU02ai7BA_IFP2Mvbu'
)

const ADMIN_EMAIL = "zioncmulangala@gmail.com"

/* AUTH CHECK */
async function verifyAdmin() {
  const { data: { user } } = await supabase.auth.getUser()
  if (!user || user.email !== ADMIN_EMAIL) {
    window.location.href = "login.html"
  }
}

verifyAdmin()

/* LOGOUT */
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await supabase.auth.signOut()
  window.location.href = "index.html"
})

/* FETCH USER DATA */
async function loadDashboard() {
  const { data, error } = await supabase
    .from('profiles')
    .select('plan')
  if (error) {
    console.error(error)
    return
  }

  const counts = {
    free: 0,
    plus: 0,
    pro: 0,
    platinum: 0
  }

  data.forEach(user => {
    if (counts[user.plan] !== undefined) {
      counts[user.plan]++
    }
  })

  document.getElementById("freeCount").textContent = counts.free
  document.getElementById("plusCount").textContent = counts.plus
  document.getElementById("proCount").textContent = counts.pro
  document.getElementById("platinumCount").textContent = counts.platinum

  renderCharts(counts)
}

function renderCharts(counts) {

  new Chart(document.getElementById("subscriberChart"), {
    type: "bar",
    data: {
      labels: ["Free","Plus","Pro","Platinum"],
      datasets: [{
        label: "Subscribers",
        data: [
          counts.free,
          counts.plus,
          counts.pro,
          counts.platinum
        ]
      }]
    }
  })

  new Chart(document.getElementById("distributionChart"), {
    type: "doughnut",
    data: {
      labels: ["Free","Plus","Pro","Platinum"],
      datasets: [{
        data: [
          counts.free,
          counts.plus,
          counts.pro,
          counts.platinum
        ]
      }]
    }
  })

}

loadDashboard()
</script>

</body>
</html>
